<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>

<meta http-equiv="Content-Language" content="fr"/>
<title>L'AMagie — Maison d'édition indépendante, non conformiste et libre</title>
<meta name="description" content="L'AMagie, maison d'édition indépendante à Félines-Minervois. Poésie, romans, ateliers d'écriture, médiation animale, peintures et dessins de Meichelus."/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{overflow-x:hidden;}
html{scroll-behavior:smooth;}

/* ============================================================
   FOND DU SITE — couleur de secours = ton parchemin de la maquette
   ============================================================ */
body{
  background-color:#ece2c8;
  min-height:100vh;
  font-family:Georgia,'Times New Roman',serif; /* utile uniquement au tooltip natif */
  -webkit-font-smoothing:antialiased;
}

/* ============================================================
   CONTENEUR PRINCIPAL — porte l'image de maquette en fond
   - largeur max 1100 px comme demandé
   - même ratio que la maquette (1024 / 1536) pour que les
     hotspots en % tombent toujours au bon endroit
   ============================================================ */
.page-maquette{
  position:relative;
  width:100%;
  max-width:1100px;
  margin:0 auto;
  aspect-ratio:1024 / 1536;
  background:url('images/fond-maquette.png') no-repeat top center;
  background-size:100% auto;
}

/* ============================================================
   CERCLE CENTRAL ANIMÉ
   - posé pile au centre, par-dessus le cercle dessiné dans la maquette
   - l'image démarre désaturée (croquis) et passe en couleur en 4 s
   ============================================================ */
.cercle-anime{
  position:absolute;
  top:48.5%;
  left:50%;
  transform:translate(-50%,-50%);
  width:38.5%;
  aspect-ratio:1 / 1;
  border-radius:50%;
  overflow:hidden;
  pointer-events:none;
}
.cercle-anime img{
  display:block;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:saturate(0) brightness(1.04) contrast(.95);
  animation:vers-couleur 4s ease 1s forwards;
}
@keyframes vers-couleur{
  to{filter:saturate(1) brightness(1) contrast(1);}
}

/* ============================================================
   HOTSPOTS INVISIBLES — superposés aux 15 textes/icônes
   ============================================================ */
.hotspot{
  position:absolute;
  display:block;
  background:transparent;
  border:none;
  text-decoration:none;
  cursor:pointer;
  border-radius:6px;
  transition:background-color .25s ease, box-shadow .25s ease;
  /* Anti-bleu de tap mobile */
  -webkit-tap-highlight-color:transparent;
}
.hotspot:hover,
.hotspot:focus-visible{
  /* Léger halo or, très subtil — feedback minimal */
  background-color:rgba(184,154,92,.10);
  box-shadow:0 0 0 1px rgba(184,154,92,.18);
  outline:none;
}

/* ============================================================
   RÉDUCTION DE MOUVEMENT
   ============================================================ */
@media(prefers-reduced-motion: reduce){
  .cercle-anime img{
    animation:none !important;
    filter:saturate(1) brightness(1) contrast(1) !important;
  }
  .hotspot{transition:none !important;}
}

/* ============================================================
   AJUSTEMENTS MOBILES
   - Tout reste en %, donc les hotspots se calent toujours sur
     l'image qui se redimensionne avec le conteneur.
   ============================================================ */
@media(max-width:760px){
  .page-maquette{max-width:100vw;}
}

/* ============================================================
   ACCESSIBILITÉ — texte alternatif lu, jamais affiché
   ============================================================ */
.sr-only{
  position:absolute;
  width:1px;height:1px;
  margin:-1px;padding:0;
  overflow:hidden;clip:rect(0,0,0,0);
  white-space:nowrap;border:0;
}

/* Sélection */
::selection{background:rgba(184,154,92,.32);color:#3a3220;}
</style>
</head>

<body>

  <!-- ============================================================
       PAGE D'ACCUEIL — maquette en fond + cercle animé + hotspots
       Tout est calé sur le ratio 1024×1536 de votre fond-maquette.png
       ============================================================ -->
  <main class="page-maquette" role="main">

    <!-- Lecteurs d'écran : titre invisible pour identifier la page -->
    <h1 class="sr-only">L&rsquo;AMagie — Maison d&rsquo;édition indépendante, non conformiste et libre</h1>

    <!-- ===== CERCLE CENTRAL ANIMÉ ===== -->
    <!-- L'image démarre en croquis désaturé et passe en couleur en 4 s.
         Si maison-lamagie.png n'est pas encore en place, le cercle reste
         vide (transparent) et le dessin de la maquette transparaît. -->
    <div class="cercle-anime" aria-hidden="true">
      <img src="images/maison-lamagie.png"
           alt=""
           loading="eager"
           decoding="async"

    <a class="hotspot" href="qui-sommes-nous.html" aria-label="La Maison (qui sommes-nous)" style="top:22.00%;left:2.00%;width:24.00%;height:8.00%;"></a>

  </main>

</body>
